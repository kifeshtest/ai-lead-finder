# Netlify-configuratie — frontend (React/Vite dashboard).
# De `base` is de web-map; Netlify draait de build daarin.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"            # relatief t.o.v. base → web/dist

[build.environment]
  NODE_VERSION = "20"

# API-proxy: /api/* wordt server-side doorgestuurd naar de Render-backend.
# Hierdoor werkt de frontend zonder VITE_API_URL en zonder CORS-gedoe.
# (Wijzig de URL hieronder als je Render-backend een andere naam heeft.)
[[redirects]]
  from = "/api/*"
  to = "https://ai-lead-finder-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA-fallback — MOET ná de /api-regel staan (Netlify pakt de eerste match).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
